[program:queue]
priority=15
autostart=true
autorestart=true
stdout_events_enabled=true
stderr_events_enabled=true
command=/usr/bin/php /var/www/html/artisan queue:work --tries=3 --timeout=60 --sleep=3 --max-time=3600
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=www-data
numprocs=1
stopwaitsecs=70
